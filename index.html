<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منفذ تحت الصيانة | Under Maintenance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/96/000000/engineer.png">
    
    <!-- لأي مشكلة في الأيقونات، نضيف fallback -->
    <style>
        /* Fallback في حالة عدم تحميل Font Awesome */
        .fa-cog:before { content: "⚙"; }
        .fa-hammer:before { content: "🔨"; }
        .fa-clock:before { content: "⏰"; }
        .fa-calendar-alt:before { content: "📅"; }
        .fa-paper-plane:before { content: "✈"; }
        .fa-tools:before { content: "🛠"; }
        .fa-hourglass-half:before { content: "⏳"; }
        .fa-telegram-plane:before { content: "📨"; }
    </style>
</head>
<body>
    <div class="container">
        <div class="maintenance-card">
            <!-- Animation -->
            <div class="animation-container">
                <div class="gear gear1">
                    <i class="fas fa-cog"></i>
                </div>
                <div class="gear gear2">
                    <i class="fas fa-cog"></i>
                </div>
                <div class="gear gear3">
                    <i class="fas fa-cog"></i>
                </div>
                <div class="hammer">
                    <i class="fas fa-hammer"></i>
                </div>
            </div>
            
            <!-- Content -->
            <div class="content">
                <h1><i class="fas fa-tools"></i> الموقع تحت الصيانة</h1>
                
                <p class="description">
                    موقع <strong>منفذ</strong> تحت الصيانة للتطوير والتحسين.
                    نعمل على تجربة مستخدم أفضل وأداء أسرع.
                    للتواصل الطارئ: <strong>t.me/Akyn0</strong>
                </p>
                                
                <!-- الصحيح: الوقت المتوقع الجديد -->
                <div class="info-item">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h3>الوقت المتوقع:</h3>
                        <p>٣ أيام - ١ أسبوع</p> <!-- التعديل هنا -->
                    </div>
                </div>

                <!-- الصحيح: التواصل الجديد -->
                <div class="info-item">
                    <i class="fas fa-paper-plane"></i> <!-- تغيير الأيقونة -->
                    <div>
                        <h3>للتواصل الطارئ:</h3>
                        <p>t.me/Akyn0</p> <!-- التعديل هنا -->
                    </div>
                </div>
                
                <div class="progress-container">
                    <div class="progress-label">
                        <span>تقدّم العمل</span>
                        <span id="progress-percentage">65%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                
                
                
                
                
                <div class="footer">
                    <p>© 2024 جميع الحقوق محفوظة | <span id="current-year"></span></p>
                    <p class="sub-text">شكرًا لتفهمكم وصبركم</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
